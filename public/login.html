<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · Digital Elements Site Monitor</title>
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0c0f17; --panel:#141926; --line:#232c40; --text:#e8edf6; --muted:#8a96ad;
    --accent:#4ea1ff; --fail:#f4675f;
    --display:"Space Grotesk",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif; --mono:"IBM Plex Mono",monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background: radial-gradient(900px 500px at 50% -10%, rgba(78,161,255,0.08), transparent 60%), var(--bg);
    color:var(--text); font-family:var(--body); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
  }
  .card { width:min(420px,100%); background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:40px 34px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,0.45); }
  .logo { width:64px; height:64px; border-radius:14px; margin:0 auto 18px; display:block; }
  .eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); }
  h1 { font-family:var(--display); font-weight:700; font-size:24px; line-height:1.2; margin:6px 0 4px; }
  p.sub { color:var(--muted); font-size:14px; margin:0 0 28px; }
  .gbtn {
    display:inline-flex; align-items:center; justify-content:center; gap:11px; width:100%;
    background:#fff; color:#1f2328; text-decoration:none; font-weight:600; font-size:15px;
    border-radius:10px; padding:13px 18px; transition:filter .15s ease;
  }
  .gbtn:hover { filter:brightness(0.96); }
  .gicon { width:20px; height:20px; }
  .err { background:rgba(244,103,95,0.12); border:1px solid rgba(244,103,95,0.4); color:#ffb4ae; font-size:13px; border-radius:9px; padding:11px 14px; margin-bottom:22px; text-align:left; }
  .foot { margin-top:22px; font-family:var(--mono); font-size:11px; color:var(--muted); }
</style>
</head>~
<body>
  <div class="card">
    <img src="/logo.png" alt="Digital Elements" class="logo" />
    <div class="eyebrow">Maintenance · Operations</div>
    <h1>Digital Elements Group<br />Site Monitoring</h1>
    <p class="sub">Sign in with your company Google account.</p>
    <div id="err" class="err" style="display:none"></div>
    <a class="gbtn" href="/auth/google">
      <svg class="gicon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </a>
    <div class="foot">Access is limited to authorized team members.</div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    if (p.get("error") === "denied") {
      const e = document.getElementById("err");
      e.style.display = "block";
      e.textContent = "That Google account isn't authorized yet. Ask an administrator to add your email.";
    }
  </script>
</body>
</html>
