<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Digital Elements Group Site Monitoring</title>
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0d14; --panel: #10141d; --panel-2: #161c28; --inset: #0d1119;
    --line: #202a3b; --line-soft: #19212f;
    --text: #e9edf5; --muted: #8b95a9; --faint: #5c6579;
    --accent: #3b82f6; --accent-hover: #2f74e6;
    --ok: #34d399; --warn: #f6b34a; --fail: #f4635b; --info: #4ea1ff;
    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); font-size: 14px; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  button { font-family: var(--body); }
  .eyebrow, .mono { font-family: var(--mono); }
  svg { display: block; }

  /* ---------- App shell ---------- */
  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  .sidebar { background: var(--panel); border-right: 1px solid var(--line-soft); display: flex; flex-direction: column; padding: 22px 16px; position: sticky; top: 0; height: 100vh; }
  .brand { display: flex; align-items: center; gap: 11px; padding: 0 6px 22px; }
  .brand img { width: 34px; height: 34px; border-radius: 9px; }
  .brand .bt { font-family: var(--display); font-weight: 700; font-size: 15px; line-height: 1.15; letter-spacing: -0.01em; }
  .brand .bt small { display: block; font-family: var(--body); font-weight: 500; font-size: 11px; color: var(--muted); letter-spacing: 0; }
  .nav { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
  .nav a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: var(--muted); text-decoration: none; font-weight: 500; cursor: pointer; transition: background .12s, color .12s; }
  .nav a svg { width: 19px; height: 19px; opacity: 0.9; }
  .nav a:hover { background: var(--panel-2); color: var(--text); }
  .nav a.active { background: color-mix(in srgb, var(--accent) 16%, transparent); color: #cfe1ff; }
  .nav a.active svg { color: var(--accent); opacity: 1; }
  .nav .badge-count { margin-left: auto; background: var(--panel-2); color: var(--muted); font-family: var(--mono); font-size: 11px; padding: 1px 8px; border-radius: 20px; }
  .side-foot { margin-top: auto; border-top: 1px solid var(--line-soft); padding-top: 14px; }
  .prof { display: flex; align-items: center; gap: 11px; padding: 4px 6px; }
  .avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex: none; }
  .prof .pn { font-weight: 600; font-size: 13px; }
  .prof .pr { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); }
  .signout { margin-top: 10px; width: 100%; display: flex; align-items: center; gap: 10px; background: transparent; border: 0; color: var(--muted); padding: 9px 8px; border-radius: 9px; cursor: pointer; font-size: 13px; }
  .signout:hover { background: var(--panel-2); color: var(--fail); }
  .signout svg { width: 17px; height: 17px; }

  /* ---------- Main ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 18px 26px; border-bottom: 1px solid var(--line-soft); position: sticky; top: 0; background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: blur(8px); z-index: 20; }
  .mbrand { display: none; align-items: center; gap: 9px; }
  .mbrand img { width: 30px; height: 30px; border-radius: 8px; }
  .page-title { font-family: var(--display); font-weight: 700; font-size: 20px; letter-spacing: -0.01em; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .last-run { text-align: right; font-size: 11px; color: var(--muted); line-height: 1.3; }
  .last-run b { color: var(--text); font-weight: 600; }
  .btn { border: 1px solid var(--line); background: var(--panel); color: var(--text); border-radius: 10px; padding: 9px 14px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: border-color .12s, background .12s; }
  .btn:hover { border-color: var(--accent); }
  .btn svg { width: 15px; height: 15px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .mavatar { display: none; }

  .content { padding: 24px 26px 90px; }
  .view[hidden] { display: none; }
  .view-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .view-head h2 { font-family: var(--display); font-size: 18px; margin: 0; }

  /* ---------- Stat cards ---------- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; }
  .stat .ic { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; position: absolute; top: 18px; right: 18px; }
  .stat .ic svg { width: 21px; height: 21px; }
  .stat .n { font-family: var(--display); font-weight: 700; font-size: 34px; line-height: 1; }
  .stat .k { font-weight: 600; margin-top: 10px; }
  .stat .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .stat.sites .ic { background: color-mix(in srgb, var(--info) 15%, transparent); color: var(--info); }
  .stat.ok .n { color: var(--ok); } .stat.ok .ic { background: color-mix(in srgb, var(--ok) 15%, transparent); color: var(--ok); }
  .stat.warn .n { color: var(--warn); } .stat.warn .ic { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }
  .stat.fail .n { color: var(--fail); } .stat.fail .ic { background: color-mix(in srgb, var(--fail) 15%, transparent); color: var(--fail); }

  /* ---------- Status matrix ---------- */
  .matrix { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius); overflow: hidden; }
  .cols { grid-template-columns: minmax(190px, 1.6fr) repeat(8, minmax(60px, 1fr)) 132px; }
  .mhead { display: grid; padding: 13px 18px; border-bottom: 1px solid var(--line-soft); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); }
  .site-block { border-bottom: 1px solid var(--line-soft); border-left: 3px solid transparent; }
  .site-block:last-child { border-bottom: 0; }
  .site-block.ok { border-left-color: var(--ok); }
  .site-block.warn { border-left-color: var(--warn); }
  .site-block.fail { border-left-color: var(--fail); }
  .site-block.skip { border-left-color: var(--faint); }
  .mrow { display: grid; align-items: center; padding: 14px 18px; cursor: pointer; }
  .mrow:hover { background: var(--panel-2); }
  .site .nm { font-weight: 600; display: block; }
  .site .ur { color: var(--muted); font-size: 12px; }
  .cell { display: flex; align-items: center; gap: 7px; font-size: 12.5px; min-width: 0; }
  .cell .lbl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell .cklabel { display: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--faint); }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.fail { background: var(--fail); }
  .dot.info { background: var(--info); } .dot.skip { background: var(--faint); }
  .cell.skip .lbl { color: var(--faint); }
  .stcell { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 11px; border-radius: 20px; white-space: nowrap; }
  .badge.ok { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); }
  .badge.warn { background: color-mix(in srgb, var(--warn) 16%, transparent); color: var(--warn); }
  .badge.fail { background: color-mix(in srgb, var(--fail) 16%, transparent); color: var(--fail); }
  .badge.skip { background: var(--panel-2); color: var(--muted); }
  .chev { color: var(--faint); transition: transform .18s; }
  .chev svg { width: 16px; height: 16px; }
  .site-block.open .chev { transform: rotate(180deg); }

  /* ---------- Detail drawer ---------- */
  .detail { max-height: 0; overflow: hidden; transition: max-height .28s ease; background: var(--inset); }
  .site-block.open .detail { max-height: 1600px; }
  .detail-inner { padding: 18px 20px 6px; display: grid; grid-template-columns: repeat(auto-fill, minmax(228px, 1fr)); gap: 14px; }
  .dcard { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 12px; padding: 14px; }
  .dcard h4 { margin: 0 0 9px; font-size: 11px; font-family: var(--mono); letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .dcard h4 .ci { width: 15px; height: 15px; color: var(--faint); }
  .dcard h4 .dot { margin-left: auto; }
  .dcard .val { font-weight: 600; font-size: 15px; }
  .dcard .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .ulist { list-style: none; margin: 9px 0 0; padding: 0; }
  .ulist li { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; padding: 3px 0; }
  .ulist .ver { font-family: var(--mono); color: var(--warn); font-size: 11px; }
  .tasks-btn { margin-top: 10px; background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
  .tasks-btn:hover { border-color: var(--accent); }
  .detail-foot { padding: 6px 20px 18px; }
  .site-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .btn.sm { padding: 7px 12px; font-size: 12px; }
  .btn.danger { border-color: color-mix(in srgb, var(--fail) 55%, var(--line)); color: var(--fail); }
  .btn.danger:hover { border-color: var(--fail); background: color-mix(in srgb, var(--fail) 10%, transparent); }
  .social-box h4 { margin: 0 0 8px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .social-list { list-style: none; margin: 0; padding: 0; }
  .social-list li { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 13px; padding: 6px 0; border-top: 1px solid var(--line-soft); }
  .social-list li:first-child { border-top: 0; }
  .social-list a { color: var(--accent); text-decoration: none; }
  .social-add { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
  .social-add input { flex: 1; min-width: 130px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 12px; }
  .social-add input.plat { flex: 0 0 130px; }
  .linkx { color: var(--fail); cursor: pointer; background: none; border: 0; font-size: 12px; }

  /* ---------- Websites list view ---------- */
  .wl { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius); overflow: hidden; }
  .wl-row { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-bottom: 1px solid var(--line-soft); }
  .wl-row:last-child { border-bottom: 0; }
  .wl-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; margin-right: auto; }
  .wl-name { font-weight: 600; }
  .wl-url { color: var(--muted); font-size: 12px; }
  .wl-flag { color: var(--warn); font-size: 11px; font-family: var(--mono); margin-top: 2px; }
  .wl-actions { display: flex; gap: 8px; }

  /* ---------- Setup banner ---------- */
  .setup-banner { background: color-mix(in srgb, var(--warn) 9%, transparent); border: 1px solid color-mix(in srgb, var(--warn) 34%, transparent); border-radius: 12px; padding: 13px 16px; margin-bottom: 18px; }
  .setup-banner .banner-head { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--warn); }
  .setup-banner ul { list-style: none; margin: 9px 0 0; padding: 0; }
  .setup-banner li { font-size: 13px; padding: 4px 0; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .setup-banner li .reason { color: var(--muted); }
  .banner-fix { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 7px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
  .banner-x { background: none; border: 0; color: var(--muted); cursor: pointer; font-size: 14px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty h3 { color: var(--text); margin: 0 0 6px; }
  .foot { color: var(--faint); font-size: 12px; margin-top: 16px; text-align: center; }
  .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; display: inline-block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Bottom nav (mobile) ---------- */
  .bottomnav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: color-mix(in srgb, var(--panel) 96%, transparent); backdrop-filter: blur(10px); border-top: 1px solid var(--line); padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); z-index: 30; }
  .bottomnav a { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--muted); text-decoration: none; font-size: 10.5px; cursor: pointer; padding: 4px 0; }
  .bottomnav a svg { width: 21px; height: 21px; }
  .bottomnav a.active { color: var(--accent); }

  /* ---------- Modals ---------- */
  .modal { position: fixed; inset: 0; background: rgba(6,9,14,0.72); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 60; overflow: auto; }
  .modal.show { display: flex; }
  .modal-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; width: min(680px, 100%); max-height: 86vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 22px 14px; border-bottom: 1px solid var(--line-soft); }
  .modal-eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .modal-head h2 { margin: 4px 0 0; font-family: var(--display); font-size: 19px; }
  .modal-count { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .modal-x { background: none; border: 0; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; }
  .modal-filters { display: flex; gap: 8px; padding: 12px 22px; border-bottom: 1px solid var(--line-soft); }
  .mfilter { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 6px 13px; font-size: 12px; cursor: pointer; }
  .mfilter.on { border-color: var(--accent); color: var(--text); }
  .modal-body { padding: 8px 22px 22px; overflow: auto; }
  .modal-form { padding: 18px 22px; overflow: auto; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select, .social-add select { width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; color: var(--text); padding: 10px 12px; font-size: 13px; }
  .checks-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0 14px; }
  label.chk { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--line-soft); }
  .btn-primary { background: var(--accent); color: #fff; border: 0; border-radius: 9px; padding: 10px 17px; font-weight: 600; cursor: pointer; font-size: 13px; }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 9px; padding: 10px 17px; cursor: pointer; font-size: 13px; }
  .err { background: color-mix(in srgb, var(--fail) 12%, transparent); border: 1px solid color-mix(in srgb, var(--fail) 40%, transparent); color: #ffb4ae; font-size: 13px; border-radius: 9px; padding: 10px 13px; }
  .urow { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-top: 1px solid var(--line-soft); }
  .urow:first-child { border-top: 0; }
  .urow .uinfo small { display: block; color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .urow select { background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 7px 9px; font-size: 12px; }
  .ttable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ttable th { text-align: left; font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--faint); padding: 8px 10px; border-bottom: 1px solid var(--line); }
  .ttable td { padding: 9px 10px; border-bottom: 1px solid var(--line-soft); }
  .ttable .tname a { color: var(--accent); text-decoration: none; }
  .ttable .badge { color: #fff; }
  .due-late { color: var(--fail); }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mbrand { display: flex; }
    .mavatar { display: flex; }
    .page-title { display: none; }
    .bottomnav { display: flex; }
    .content { padding: 18px 16px 96px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .last-run { display: none; }
    .topbar { padding: 14px 16px; }

    .mhead { display: none; }
    .mrow { display: block; padding: 14px 16px; position: relative; }
    .mrow .site { margin-bottom: 12px; padding-right: 90px; }
    .stcell { position: absolute; top: 14px; right: 14px; }
    .cell { display: inline-flex; width: auto; background: var(--panel-2); border-radius: 8px; padding: 6px 9px; margin: 0 6px 6px 0; }
    .cell .cklabel { display: inline; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--faint); }
    .detail-inner { grid-template-columns: 1fr; }
  }
  @media (max-width: 520px) { .stats { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="/logo.png" alt="" />
      <div class="bt">Digital Elements Group<small>Site Monitoring</small></div>
    </div>
    <nav class="nav" id="nav">
      <a id="nav-dashboard" class="active" onclick="showView('dashboard')">__ICON_DASH__ Dashboard</a>
      <a id="nav-websites" onclick="showView('websites')">__ICON_GLOBE__ Websites</a>
      <a id="nav-users" style="display:none" onclick="openUsers()">__ICON_USERS__ Users</a>
    </nav>
    <div class="side-foot">
      <div class="prof">
        <div class="avatar" id="avatarInit">–</div>
        <div><div class="pn" id="profileName">…</div><div class="pr" id="profileRole"></div></div>
      </div>
      <button class="signout" onclick="logout()">__ICON_OUT__ Sign out</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="mbrand"><img src="/logo.png" alt="" /></div>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="last-run" id="lastRun">Loading…</div>
        <button class="btn primary" id="runBtn" onclick="runChecks()">__ICON_RUN__ Run checks</button>
        <button class="btn" id="addSiteBtn" style="display:none" onclick="openWebsiteModal()">__ICON_PLUS__ Website</button>
        <div class="avatar mavatar" id="mAvatar" title="">–</div>
      </div>
    </header>

    <div class="content">
      <section class="view" id="view-dashboard">
        <div id="setupBanner" class="setup-banner" style="display:none"></div>
        <div class="stats" id="stats"></div>
        <div id="board"></div>
        <div class="foot" id="foot"></div>
      </section>

      <section class="view" id="view-websites" hidden>
        <div class="view-head">
          <h2>Websites</h2>
          <button class="btn primary" id="addSiteBtn2" style="display:none" onclick="openWebsiteModal()">__ICON_PLUS__ Add website</button>
        </div>
        <div class="wl" id="websitesList"></div>
      </section>
    </div>
  </div>

  <nav class="bottomnav">
    <a id="bn-dashboard" class="active" onclick="showView('dashboard')">__ICON_DASH__ Dashboard</a>
    <a id="bn-websites" onclick="showView('websites')">__ICON_GLOBE__ Websites</a>
    <a id="bn-users" style="display:none" onclick="openUsers()">__ICON_USERS__ Users</a>
    <a id="bn-signout" onclick="logout()">__ICON_OUT__ Sign out</a>
  </nav>
</div>

<script>
const CHECKS = [
  ["https", "HTTPS"], ["ssl", "SSL"], ["cloudflare", "Cloudflare"], ["ctm", "CTM"],
  ["googleTag", "Google Tag"], ["pagespeed", "PageSpeed"], ["plugins", "Updates"], ["clickup", "Tasks"],
];
const ROLE_LABELS = { admin: "Administrator", webdev: "Web Developer", seo: "SEO", publisher: "Publisher", social: "Social Media" };

let latestData = null, WEBSITES = [], bannerDismissed = false, modalTasks = [];
let resultsTimer = null, websitesTimer = null, currentView = "dashboard";
let ME = { user: null, perms: {} };
const openRows = new Set();
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// ---------- Data loading + live polling ----------
async function load() {
  try {
    const res = await fetch("/api/results");
    const data = await res.json();
    render(data);
    scheduleResults(data.running ? 2500 : 15000);
    const btn = document.getElementById("runBtn");
    if (!data.running && btn.dataset.busy === "1") { btn.dataset.busy = "0"; btn.disabled = false; btn.innerHTML = ICON.run + " Run checks"; }
  } catch (e) {
    document.getElementById("board").innerHTML = '<div class="empty"><h3>Can\u2019t reach the server</h3><p>Check that the app is still running, then reload.</p></div>';
  }
}
function scheduleResults(ms) { clearInterval(resultsTimer); resultsTimer = setInterval(load, ms); }
function startLive() {
  scheduleResults(15000);
  clearInterval(websitesTimer);
  websitesTimer = setInterval(async () => { await refreshWebsites(); render(latestData || { sites: {} }); }, 20000);
}
async function runChecks() {
  const btn = document.getElementById("runBtn");
  btn.disabled = true; btn.dataset.busy = "1"; btn.innerHTML = '<span class="spinner"></span> Running';
  try { await fetch("/api/check", { method: "POST" }); scheduleResults(2500); }
  catch (e) { btn.disabled = false; btn.dataset.busy = "0"; btn.innerHTML = ICON.run + " Run checks"; }
}

// ---------- Rendering ----------
function statusInfo(o) {
  return ({ ok: ["ok", "Operational"], warn: ["warn", "Warning"], fail: ["fail", "Failing"] }[o]) || ["skip", "Pending"];
}
function render(data) {
  latestData = data;
  const results = data.sites || {};
  let sites;
  if (WEBSITES.length) {
    sites = WEBSITES.map((w) => {
      const r = results[w.id];
      return r ? { ...r, name: w.name, url: w.url } : { id: w.id, name: w.name, url: w.url, overall: "skip", checks: {}, pending: true };
    });
  } else { sites = Object.values(results); }

  document.getElementById("lastRun").innerHTML = data.lastRun
    ? "Last sweep<br><b>" + new Date(data.lastRun).toLocaleString() + "</b>" : "No sweeps yet";

  renderSetupBanner();

  const counts = { ok: 0, warn: 0, fail: 0 };
  sites.forEach((s) => { counts[s.overall === "skip" ? "ok" : s.overall]++; });
  document.getElementById("stats").innerHTML =
    statCard("sites", sites.length, "Total websites", "Sites", ICON.globe) +
    statCard("ok", counts.ok, "All good", "Operational", ICON.shieldCheck) +
    statCard("warn", counts.warn, "Needs attention", "Warnings", ICON.alert) +
    statCard("fail", counts.fail, "Critical issues", "Failing", ICON.xcircle);

  const board = document.getElementById("board");
  if (!sites.length) {
    board.innerHTML = '<div class="empty"><h3>No sites yet</h3><p>Use <b>Run checks</b> after adding your first site with the Website button.</p></div>';
  } else {
    let head = '<div class="mhead cols"><div>Website</div>';
    CHECKS.forEach(([, l]) => { head += `<div>${l}</div>`; });
    head += "<div style=\"text-align:right\">Status</div></div>";
    const rows = sites.sort((a, b) => rank(b.overall) - rank(a.overall)).map(renderRow).join("");
    board.innerHTML = '<div class="matrix">' + head + rows + "</div>";
  }
  document.getElementById("foot").textContent = "Checks run automatically in the background; alerts fire when a status changes. Select a site for detail.";

  if (currentView === "websites") renderWebsitesList();
}
function rank(s) { return { fail: 3, warn: 2, ok: 1, skip: 0 }[s] || 0; }

function statCard(kind, n, sub, label, icon) {
  return `<div class="stat ${kind}"><div class="ic">${icon}</div><div class="n">${n}</div><div class="k">${label}</div><div class="sub">${sub}</div></div>`;
}
function statusBadge(o) { const [c, t] = statusInfo(o); return `<span class="badge ${c}">${t}</span>`; }

function renderRow(s) {
  const open = openRows.has(s.id) ? " open" : "";
  let cells = "";
  CHECKS.forEach(([key, label]) => {
    const c = (s.checks && s.checks[key]) || { status: "skip", label: "\u2014" };
    cells += `<div class="cell ${c.status}" title="${esc(c.detail || "")}"><span class="cklabel">${label}</span><span class="dot ${c.status}"></span><span class="lbl">${esc(c.label || "\u2014")}</span></div>`;
  });
  return `<div class="site-block ${s.overall}${open}" id="row-${s.id}">
      <div class="mrow cols" onclick="toggle('${s.id}')">
        <div class="site"><span class="nm">${esc(s.name)}</span><span class="ur">${esc(s.url)}</span></div>
        ${cells}
        <div class="stcell">${statusBadge(s.overall)}<span class="chev">${ICON.chevron}</span></div>
      </div>
      <div class="detail">${detailHtml(s)}</div>
    </div>`;
}

function detailHtml(s) {
  const cards = CHECKS.map(([key, label]) => {
    const c = (s.checks && s.checks[key]) || { status: "skip", label: "\u2014", detail: "" };
    let extra = "";
    if (key === "plugins" && c.meta) {
      const u = c.meta.pluginUpdates || [], t = c.meta.themeUpdates || [];
      if (c.meta.coreUpdate) extra += `<div class="sub">WordPress core \u2192 ${esc(c.meta.coreNewVersion || "update")}</div>`;
      if (u.length) extra += '<ul class="ulist">' + u.map((p) => `<li><span>${esc(p.name)}</span><span class="ver">${esc(p.current || "?")} \u2192 ${esc(p.new_version || "?")}</span></li>`).join("") + "</ul>";
      if (t.length) extra += '<ul class="ulist">' + t.map((p) => `<li><span>${esc(p.name)} (theme)</span><span class="ver">${esc(p.current || "?")} \u2192 ${esc(p.new_version || "?")}</span></li>`).join("") + "</ul>";
    }
    if (key === "pagespeed" && c.metrics) {
      const m = c.metrics;
      const bits = [m.lcp && "LCP " + m.lcp, m.cls && "CLS " + m.cls, m.tbt && "TBT " + m.tbt, m.fcp && "FCP " + m.fcp].filter(Boolean);
      if (bits.length) extra += '<div class="sub">' + esc(bits.join(" \u00b7 ")) + "</div>";
    }
    if (key === "clickup" && c.meta) {
      const bl = c.meta.byList || [];
      if (bl.length) extra += '<ul class="ulist">' + bl.map((l) => `<li><span>${esc(l.name)}</span><span class="ver">${l.active} open \u00b7 ${l.done} done</span></li>`).join("") + "</ul>";
      const total = (c.meta.active || 0) + (c.meta.done || 0);
      extra += `<button class="tasks-btn" onclick="event.stopPropagation(); openTasks('${s.id}')">View ${total ? total + " " : ""}tasks</button>`;
      if (c.meta.spaceUrl) extra += `<div class="sub"><a href="${esc(c.meta.spaceUrl)}" target="_blank" rel="noopener" style="color:var(--accent)">Open in ClickUp \u2192</a></div>`;
    }
    return `<div class="dcard"><h4><span class="ci">${CICON[key] || ""}</span>${label}<span class="dot ${c.status}"></span></h4>
        <div class="val">${esc(c.label || "\u2014")}</div><div class="sub">${esc(c.detail || "")}</div>${extra}</div>`;
  }).join("");
  return '<div class="detail-inner">' + cards + "</div>" + detailFoot(s);
}
function detailFoot(s) {
  let btns = "";
  if (ME.perms.manageWebsites) btns += `<button class="btn sm" onclick="event.stopPropagation(); editWebsite('${s.id}')">Edit site</button>`;
  if (ME.perms.deleteWebsite) btns += `<button class="btn sm danger" onclick="event.stopPropagation(); deleteWebsite('${s.id}', '${esc((s.name || "").replace(/'/g, ""))}')">Delete site</button>`;
  const actions = btns ? `<div class="site-actions">${btns}</div>` : "";
  return `<div class="detail-foot">${actions}<div class="social-box"><h4>Social links</h4><div id="social-${s.id}">\u2026</div></div></div>`;
}
function toggle(id) {
  if (openRows.has(id)) openRows.delete(id);
  else { openRows.add(id); loadSocial(id); }
  const row = document.getElementById("row-" + id);
  if (row) row.classList.toggle("open");
}

// ---------- Views / navigation ----------
function showView(name) {
  currentView = name;
  document.getElementById("view-dashboard").hidden = name !== "dashboard";
  document.getElementById("view-websites").hidden = name !== "websites";
  document.getElementById("pageTitle").textContent = name === "websites" ? "Websites" : "Dashboard";
  ["dashboard", "websites"].forEach((v) => {
    document.getElementById("nav-" + v).classList.toggle("active", v === name);
    document.getElementById("bn-" + v).classList.toggle("active", v === name);
  });
  if (name === "websites") renderWebsitesList();
}
function renderWebsitesList() {
  const box = document.getElementById("websitesList");
  if (!WEBSITES.length) { box.innerHTML = '<div class="empty"><h3>No sites yet</h3><p>Add your first site to start monitoring.</p></div>'; return; }
  const canManage = !!ME.perms.manageWebsites, canDelete = !!ME.perms.deleteWebsite;
  box.innerHTML = WEBSITES.map((w) => {
    const r = latestData && latestData.sites && latestData.sites[w.id];
    const overall = r ? r.overall : "skip";
    const needs = incompleteReasons(w).length;
    return `<div class="wl-row">
      <div class="wl-main"><span class="wl-name">${esc(w.name)}</span><span class="wl-url">${esc(w.url)}</span>${needs ? '<span class="wl-flag">Needs setup</span>' : ""}</div>
      ${statusBadge(overall)}
      <div class="wl-actions">
        ${canManage ? `<button class="btn sm" onclick="editWebsite('${w.id}')">Edit</button>` : ""}
        ${canDelete ? `<button class="btn sm danger" onclick="deleteWebsite('${w.id}','${esc((w.name || "").replace(/'/g, ""))}')">Delete</button>` : ""}
      </div></div>`;
  }).join("");
}

// ---------- Setup banner ----------
function incompleteReasons(w) {
  const r = [];
  if (!w.helper || !w.helper.enabled) r.push("Updates not set up (no helper plugin)");
  else if (!w.helper.endpoint || !w.helper.token) r.push("Helper endpoint or token missing");
  if (w.clickup && w.clickup.enabled && (!w.clickup.listIds || !w.clickup.listIds.length)) r.push("ClickUp enabled but no List IDs");
  return r;
}
function renderSetupBanner() {
  const el = document.getElementById("setupBanner");
  if (bannerDismissed) { el.style.display = "none"; return; }
  const flagged = (WEBSITES || []).map((w) => ({ w, reasons: incompleteReasons(w) })).filter((x) => x.reasons.length);
  if (!flagged.length) { el.style.display = "none"; return; }
  const canEdit = !!ME.perms.manageWebsites;
  const items = flagged.map(({ w, reasons }) =>
    `<li><b>${esc(w.name)}</b><span class="reason">${esc(reasons.join(" \u00b7 "))}</span>${canEdit ? `<button class="banner-fix" onclick="editWebsite('${w.id}')">Complete setup</button>` : ""}</li>`).join("");
  el.innerHTML = `<div class="banner-head"><span>\u26a0 ${flagged.length} website${flagged.length > 1 ? "s" : ""} need setup</span><button class="banner-x" onclick="dismissBanner()">\u2715</button></div><ul>${items}</ul>`;
  el.style.display = "block";
}
function dismissBanner() { bannerDismissed = true; document.getElementById("setupBanner").style.display = "none"; }

// ---------- Auth / boot ----------
async function boot() {
  try {
    const res = await fetch("/api/me");
    if (res.status === 401) { location.href = "/login"; return; }
    const j = await res.json();
    ME = { user: j.user, perms: j.perms || {} };
  } catch (e) { document.getElementById("board").innerHTML = '<div class="empty"><h3>Can\u2019t reach the server</h3></div>'; return; }

  document.getElementById("runBtn").innerHTML = ICON.run + " Run checks";
  document.getElementById("addSiteBtn").innerHTML = ICON.plus + " Website";
  const name = ME.user.name || ME.user.email;
  const init = name.split(/[\s@.]+/).filter(Boolean).slice(0, 2).map((x) => x[0].toUpperCase()).join("");
  document.getElementById("profileName").textContent = name;
  document.getElementById("profileRole").textContent = ROLE_LABELS[ME.user.role] || ME.user.role;
  document.getElementById("avatarInit").textContent = init;
  document.getElementById("mAvatar").textContent = init;
  document.getElementById("mAvatar").title = name;
  if (ME.perms.manageWebsites) { document.getElementById("addSiteBtn").style.display = "inline-flex"; document.getElementById("addSiteBtn2").style.display = "inline-flex"; }
  if (ME.perms.manageUsers) { document.getElementById("nav-users").style.display = "flex"; document.getElementById("bn-users").style.display = "flex"; }

  await refreshWebsites();
  await load();
  startLive();
}
async function logout() { await fetch("/auth/logout", { method: "POST" }); location.href = "/login"; }

// ---------- Website add / edit / delete ----------
let editingSiteId = null;
function openWebsiteModal(site) {
  editingSiteId = site ? site.id : null;
  document.getElementById("siteModalTitle").textContent = site ? "Edit website" : "Add website";
  const g = (id) => document.getElementById(id);
  g("f-name").value = site ? site.name : "";
  g("f-url").value = site ? site.url : "";
  g("f-lists").value = site && site.clickup && site.clickup.listIds ? site.clickup.listIds.join(", ") : "";
  g("f-cu").checked = site ? !!(site.clickup && site.clickup.enabled) : false;
  g("f-cf").checked = site ? site.expect.cloudflare !== false : true;
  g("f-ctm").checked = site ? site.expect.ctm !== false : true;
  g("f-gt").checked = site ? site.expect.googleTag !== false : true;
  g("f-hep").value = site && site.helper ? (site.helper.endpoint || "") : "";
  g("f-htok").value = site && site.helper ? (site.helper.token || "") : "";
  g("f-he").checked = site ? !!(site.helper && site.helper.enabled) : false;
  g("siteModalErr").style.display = "none";
  g("siteModal").classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeWebsiteModal() { document.getElementById("siteModal").classList.remove("show"); document.body.style.overflow = ""; }
async function refreshWebsites() {
  try { const res = await fetch("/api/websites"); const j = await res.json(); if (j.ok) WEBSITES = j.websites || []; } catch (e) {}
  return WEBSITES;
}
function afterMutation() {
  bannerDismissed = false;
  refreshWebsites().then(() => render(latestData || { sites: {} }));
  fetch("/api/check", { method: "POST" }).then(() => scheduleResults(2500)).catch(() => {});
}
async function editWebsite(id) {
  let site = WEBSITES.find((w) => w.id === id);
  if (!site) { await refreshWebsites(); site = WEBSITES.find((w) => w.id === id); }
  if (site) openWebsiteModal(site);
  else alert("Couldn\u2019t load this site\u2019s saved settings. Reload the page and try again.");
}
async function saveWebsite() {
  const g = (id) => document.getElementById(id);
  const body = {
    name: g("f-name").value, url: g("f-url").value,
    clickup_list_ids: g("f-lists").value, clickup_enabled: g("f-cu").checked,
    expect_cloudflare: g("f-cf").checked, expect_ctm: g("f-ctm").checked, expect_google_tag: g("f-gt").checked,
    helper_endpoint: g("f-hep").value, helper_token: g("f-htok").value, helper_enabled: g("f-he").checked,
  };
  const btn = g("siteSaveBtn"); btn.disabled = true; btn.textContent = "Saving\u2026";
  try {
    const url = editingSiteId ? "/api/websites/" + editingSiteId : "/api/websites";
    const res = await fetch(url, { method: editingSiteId ? "PUT" : "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const j = await res.json();
    if (!j.ok) throw new Error(j.error || "Save failed");
    closeWebsiteModal(); afterMutation();
  } catch (e) { const err = g("siteModalErr"); err.style.display = "block"; err.textContent = e.message; }
  finally { btn.disabled = false; btn.textContent = "Save"; }
}
async function deleteWebsite(id, name) {
  if (!confirm(`Delete "${name}"? This removes it from monitoring and deletes its social links.`)) return;
  const res = await fetch("/api/websites/" + id, { method: "DELETE" });
  const j = await res.json();
  if (j.ok) { openRows.delete(id); afterMutation(); } else alert(j.error || "Delete failed");
}

// ---------- Users ----------
function openUsers() { document.getElementById("usersModal").classList.add("show"); document.body.style.overflow = "hidden"; renderUsers(); }
function closeUsers() { document.getElementById("usersModal").classList.remove("show"); document.body.style.overflow = ""; }
async function renderUsers() {
  const box = document.getElementById("usersList");
  box.innerHTML = "Loading\u2026";
  const res = await fetch("/api/users");
  const j = await res.json();
  if (!j.ok) { box.innerHTML = esc(j.error || "Failed to load"); return; }
  box.innerHTML = j.users.map((u) => {
    const opts = Object.keys(ROLE_LABELS).map((r) => `<option value="${r}" ${u.role === r ? "selected" : ""}>${ROLE_LABELS[r]}</option>`).join("");
    return `<div class="urow"><div class="uinfo">${esc(u.name || u.email)}<small>${esc(u.email)}</small></div>
      <div style="display:flex;gap:8px;align-items:center"><select onchange="changeUserRole('${u.id}', this.value)">${opts}</select>
      <button class="linkx" onclick="removeUser('${u.id}','${esc(u.email)}')">Remove</button></div></div>`;
  }).join("") || '<div class="empty">No users yet.</div>';
}
async function addUser() {
  const email = document.getElementById("nu-email").value.trim(), role = document.getElementById("nu-role").value;
  const err = document.getElementById("usersErr"); err.style.display = "none";
  const res = await fetch("/api/users", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, role }) });
  const j = await res.json();
  if (!j.ok) { err.style.display = "block"; err.textContent = j.error || "Failed"; return; }
  document.getElementById("nu-email").value = ""; renderUsers();
}
async function changeUserRole(id, role) {
  const res = await fetch("/api/users/" + id, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ role }) });
  const j = await res.json();
  if (!j.ok) { alert(j.error || "Failed"); renderUsers(); }
}
async function removeUser(id, email) {
  if (!confirm(`Remove ${email}? They lose access immediately.`)) return;
  const res = await fetch("/api/users/" + id, { method: "DELETE" });
  const j = await res.json();
  if (j.ok) renderUsers(); else alert(j.error || "Failed");
}

// ---------- Social links ----------
async function loadSocial(siteId) {
  const box = document.getElementById("social-" + siteId);
  if (!box) return;
  try {
    const res = await fetch("/api/websites/" + siteId + "/social");
    const j = await res.json();
    const links = (j.ok && j.links) || [];
    const canEdit = !!ME.perms.editSocial;
    const list = links.length
      ? '<ul class="social-list">' + links.map((l) => `<li><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.platform)}</a>${canEdit ? `<button class="linkx" onclick="removeSocial('${l.id}','${siteId}')">remove</button>` : ""}</li>`).join("") + "</ul>"
      : '<div class="sub" style="font-size:12px">No social links yet.</div>';
    const adder = canEdit ? `<div class="social-add"><input class="plat" id="sp-${siteId}" placeholder="Platform" /><input id="su-${siteId}" placeholder="https://\u2026" /><button class="btn-primary" onclick="addSocial('${siteId}')">Add</button></div>` : "";
    box.innerHTML = list + adder;
  } catch (e) { box.innerHTML = '<div class="sub">Could not load links.</div>'; }
}
async function addSocial(siteId) {
  const platform = document.getElementById("sp-" + siteId).value.trim(), url = document.getElementById("su-" + siteId).value.trim();
  if (!platform || !url) return;
  const res = await fetch("/api/websites/" + siteId + "/social", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ platform, url }) });
  const j = await res.json();
  if (j.ok) loadSocial(siteId); else alert(j.error || "Failed");
}
async function removeSocial(id, siteId) {
  const res = await fetch("/api/social/" + id, { method: "DELETE" });
  const j = await res.json();
  if (j.ok) loadSocial(siteId); else alert(j.error || "Failed");
}

// ---------- Task modal ----------
let modalSiteId = null, modalFilter = "all";
function fmtDue(ms) { return ms ? new Date(ms).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "\u2014"; }
async function openTasks(id) {
  modalSiteId = id; modalFilter = "all"; modalTasks = [];
  const site = latestData && latestData.sites[id];
  document.getElementById("modal-title").textContent = site ? site.name : "Tasks";
  document.getElementById("modal-count").textContent = "";
  document.querySelectorAll(".mfilter").forEach((b) => b.classList.toggle("on", b.dataset.f === "all"));
  document.getElementById("modal-body").innerHTML = '<div class="empty" style="padding:40px">Loading tasks\u2026</div>';
  document.getElementById("modal").classList.add("show"); document.body.style.overflow = "hidden";
  try {
    const res = await fetch("/api/tasks/" + encodeURIComponent(id));
    const j = await res.json();
    if (!j.ok) { document.getElementById("modal-body").innerHTML = '<div class="empty" style="padding:40px">' + esc(j.error || "Could not load tasks.") + "</div>"; return; }
    modalTasks = j.tasks || []; renderModal();
  } catch (e) { document.getElementById("modal-body").innerHTML = '<div class="empty" style="padding:40px">Could not reach the server.</div>'; }
}
function closeTasks() { document.getElementById("modal").classList.remove("show"); document.body.style.overflow = ""; modalSiteId = null; }
function setFilter(f) { modalFilter = f; renderModal(); }
function renderModal() {
  const site = latestData && latestData.sites[modalSiteId];
  const all = modalTasks || [];
  const tasks = modalFilter === "open" ? all.filter((t) => !t.done) : all;
  document.getElementById("modal-title").textContent = site ? site.name : "Tasks";
  const openCount = all.filter((t) => !t.done).length, overdue = all.filter((t) => t.overdue).length;
  document.getElementById("modal-count").textContent = `${all.length} total \u00b7 ${openCount} open` + (overdue ? ` \u00b7 ${overdue} overdue` : "");
  document.querySelectorAll(".mfilter").forEach((b) => b.classList.toggle("on", b.dataset.f === modalFilter));
  const rows = tasks.map((t) => {
    const badge = `<span class="badge" style="background:${esc(t.statusColor || "#5b6680")}">${esc(t.status || "\u2014")}</span>`;
    const name = t.url ? `<a href="${esc(t.url)}" target="_blank" rel="noopener">${esc(t.name)}</a>` : esc(t.name);
    const pri = t.priority ? `<span style="color:${esc(t.priorityColor || "#8a96ad")}">${esc(t.priority)}</span>` : "\u2014";
    const due = `<span class="${t.overdue ? "due-late" : ""}">${fmtDue(t.dueMs)}</span>`;
    const who = t.assignees && t.assignees.length ? esc(t.assignees.join(", ")) : "\u2014";
    return `<tr><td class="tname">${name}</td><td>${esc(t.list)}</td><td>${badge}</td><td>${who}</td><td>${due}</td><td>${pri}</td></tr>`;
  }).join("");
  document.getElementById("modal-body").innerHTML = tasks.length
    ? `<table class="ttable"><thead><tr><th>Task</th><th>List</th><th>Status</th><th>Assignee</th><th>Due</th><th>Priority</th></tr></thead><tbody>${rows}</tbody></table>`
    : '<div class="empty" style="padding:40px">No tasks to show.</div>';
}
document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeTasks(); closeWebsiteModal(); closeUsers(); } });

const ICON = {

// Swap icon placeholders in the nav/menu for real SVGs.
function initIcons() {
  const map = {
    "nav-dashboard": ICON.dash + " Dashboard", "nav-websites": ICON.globe + " Websites", "nav-users": ICON.users + " Users",
    "bn-dashboard": ICON.dash + "Dashboard", "bn-websites": ICON.globe + "Websites", "bn-users": ICON.users + "Users", "bn-signout": ICON.out + "Sign out",
    "runBtn": ICON.run + " Run checks", "addSiteBtn": ICON.plus + " Website", "addSiteBtn2": ICON.plus + " Add website",
  };
  for (const id in map) { const el = document.getElementById(id); if (el) el.innerHTML = map[id]; }

}

<div class="modal" id="modal" onclick="if(event.target===this)closeTasks()">
  <div class="modal-panel">
    <div class="modal-head">
      <div><div class="modal-eyebrow">ClickUp tasks</div><h2 id="modal-title">Tasks</h2><div class="modal-count" id="modal-count"></div></div>
      <button class="modal-x" onclick="closeTasks()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-filters">
      <button class="mfilter on" data-f="all" onclick="setFilter('all')">All</button>
      <button class="mfilter" data-f="open" onclick="setFilter('open')">Open only</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="modal" id="siteModal" onclick="if(event.target===this)closeWebsiteModal()">
  <div class="modal-panel">
    <div class="modal-head"><div><div class="modal-eyebrow">Website</div><h2 id="siteModalTitle">Add website</h2></div><button class="modal-x" onclick="closeWebsiteModal()">&times;</button></div>
    <div class="modal-form">
      <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Client name" /></div>
      <div class="field"><label>URL</label><input type="url" id="f-url" placeholder="https://example.com" /></div>
      <div class="field"><label>ClickUp List IDs (comma-separated)</label><input type="text" id="f-lists" placeholder="901bbb, 901ccc" /></div>
      <div class="checks-row">
        <label class="chk"><input type="checkbox" id="f-cu" /> ClickUp enabled</label>
        <label class="chk"><input type="checkbox" id="f-cf" checked /> Expect Cloudflare</label>
        <label class="chk"><input type="checkbox" id="f-ctm" checked /> Expect CTM</label>
        <label class="chk"><input type="checkbox" id="f-gt" checked /> Expect Google Tag</label>
      </div>
      <div class="field"><label>Helper endpoint (optional)</label><input type="text" id="f-hep" placeholder="https://site.com/wp-json/wpmonitor/v1/status" /></div>
      <div class="field"><label>Helper token (optional)</label><input type="text" id="f-htok" /></div>
      <label class="chk"><input type="checkbox" id="f-he" /> Helper plugin installed (enable Updates)</label>
      <div id="siteModalErr" class="err" style="display:none;margin-top:12px"></div>
    </div>
    <div class="modal-actions"><button class="btn-ghost" onclick="closeWebsiteModal()">Cancel</button><button class="btn-primary" id="siteSaveBtn" onclick="saveWebsite()">Save</button></div>
  </div>
</div>

<div class="modal" id="usersModal" onclick="if(event.target===this)closeUsers()">
  <div class="modal-panel">
    <div class="modal-head"><div><div class="modal-eyebrow">Team</div><h2>Users &amp; roles</h2></div><button class="modal-x" onclick="closeUsers()">&times;</button></div>
    <div class="modal-form">
      <div class="social-add">
        <input type="email" id="nu-email" placeholder="name@company.com" />
        <select id="nu-role"><option value="webdev">Web Developer</option><option value="admin">Administrator</option><option value="seo">SEO</option><option value="publisher">Publisher</option><option value="social">Social Media</option></select>
        <button class="btn-primary" onclick="addUser()">Add</button>
      </div>
      <div id="usersErr" class="err" style="display:none;margin-top:10px"></div>
      <div id="usersList" style="margin-top:14px"></div>
    </div>
  </div>
</div>
</body>
</html>
