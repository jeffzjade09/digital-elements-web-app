<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Digital Elements Group Site Monitoring</title>
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0f17;
    --panel: #141926;
    --panel-2: #1a2030;
    --line: #232c40;
    --line-soft: #1c2436;
    --text: #e8edf6;
    --muted: #8a96ad;
    --faint: #5b6680;
    --accent: #4ea1ff;
    --ok: #34d399;
    --warn: #f5b945;
    --fail: #f4675f;
    --skip: #5b6680;
    --display: "Space Grotesk", system-ui, sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(78,161,255,0.06), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 64px; }

  /* ---- Header ---- */
  header.bar { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .brand { display: flex; flex-direction: column; gap: 4px; }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
  }
  .brand h1 {
    font-family: var(--display); font-weight: 700; font-size: 30px;
    letter-spacing: -0.01em; margin: 0;
  }
  .controls { display: flex; align-items: center; gap: 16px; }
  .last-run { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: right; }
  .last-run b { color: var(--text); font-weight: 500; }

  button.run {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--bg); background: var(--accent); border: 0; border-radius: 8px;
    padding: 11px 18px; cursor: pointer; font-weight: 500;
    display: inline-flex; align-items: center; gap: 9px; transition: filter 0.15s ease;
  }
  button.run:hover { filter: brightness(1.08); }
  button.run:disabled { cursor: default; opacity: 0.6; }
  button.run:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .spinner {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid rgba(12,15,23,0.35); border-top-color: var(--bg);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Summary strip ---- */
  .summary { display: flex; gap: 1px; margin: 24px 0 18px; background: var(--line); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .stat { flex: 1; background: var(--panel); padding: 16px 18px; }
  .stat .n { font-family: var(--display); font-size: 28px; font-weight: 600; line-height: 1; }
  .stat .k { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 7px; }
  .stat.ok .n { color: var(--ok); }
  .stat.warn .n { color: var(--warn); }
  .stat.fail .n { color: var(--fail); }

  /* ---- Matrix ---- */
  .matrix { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--panel); }
  .mrow { display: grid; grid-template-columns: 6px minmax(180px, 1.6fr) repeat(8, 1fr); align-items: stretch; border-top: 1px solid var(--line-soft); }
  .mrow:first-child { border-top: 0; }
  .mhead { background: var(--panel-2); }
  .mhead .cell, .mhead .site { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); padding: 11px 12px; }
  .rail { width: 6px; }
  .rail.ok { background: var(--ok); }
  .rail.warn { background: var(--warn); }
  .rail.fail { background: var(--fail); }
  .rail.skip { background: var(--skip); }
  .rail.head { background: transparent; }

  .site { padding: 14px 14px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
  .site .nm { font-weight: 600; font-size: 14px; }
  .site .ur { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .cell { padding: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; border-left: 1px solid var(--line-soft); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.fail { background: var(--fail); box-shadow: 0 0 0 0 rgba(244,103,95,0.5); animation: pulse 1.8s ease-out infinite; }
  .dot.skip { background: var(--skip); }
  .dot.info { background: var(--accent); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244,103,95,0.45); } 70% { box-shadow: 0 0 0 6px rgba(244,103,95,0); } 100% { box-shadow: 0 0 0 0 rgba(244,103,95,0); } }
  .cell .lbl { font-family: var(--mono); font-size: 11.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell.skip .lbl { color: var(--faint); }

  /* ---- Detail drawer ---- */
  .detail { grid-column: 1 / -1; background: #0f1422; border-top: 1px solid var(--line-soft); display: none; padding: 0; }
  .mrow.open .detail { display: block; }
  .detail-inner { padding: 16px 18px 20px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .dcard { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 9px; padding: 12px 13px; }
  .dcard h4 { margin: 0 0 6px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .dcard .val { font-size: 13px; font-weight: 500; }
  .dcard .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .ulist { list-style: none; margin: 7px 0 0; padding: 0; }
  .ulist li { font-family: var(--mono); font-size: 11.5px; color: var(--text); padding: 3px 0; border-top: 1px solid var(--line-soft); display: flex; justify-content: space-between; gap: 10px; }
  .ulist li:first-child { border-top: 0; }
  .ulist .ver { color: var(--warn); }

  .empty { text-align: center; padding: 64px 24px; color: var(--muted); }
  .empty h3 { font-family: var(--display); color: var(--text); font-weight: 600; margin: 0 0 8px; }

  footer.note { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-top: 18px; text-align: center; }

  @media (max-width: 860px) {
    .mhead { display: none; }
    .mrow { grid-template-columns: 6px 1fr; }
    .site { grid-column: 2; }
    .cell { grid-column: 2; border-left: 0; border-top: 1px solid var(--line-soft); justify-content: space-between; }
    .cell::before { content: attr(data-k); font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); }
  }
  @media (prefers-reduced-motion: reduce) { .dot.fail, .spinner { animation: none; } }

  /* View tasks button */
  .tasks-btn { margin-top: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); background: transparent; border: 1px solid var(--accent); border-radius: 6px; padding: 7px 12px; cursor: pointer; transition: background 0.15s ease; }
  .tasks-btn:hover { background: rgba(78,161,255,0.12); }

  /* Modal */
  .modal { position: fixed; inset: 0; background: rgba(6,9,14,0.72); backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 50; }
  .modal.show { display: flex; }
  .modal-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; width: min(960px, 100%); max-height: 86vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .modal-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 22px 14px; border-bottom: 1px solid var(--line-soft); }
  .modal-eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .modal-head h2 { font-family: var(--display); font-weight: 600; font-size: 22px; margin: 4px 0 2px; }
  .modal-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .modal-x { background: transparent; border: 0; color: var(--muted); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; }
  .modal-x:hover { color: var(--text); }
  .modal-filters { display: flex; gap: 8px; padding: 12px 22px; border-bottom: 1px solid var(--line-soft); }
  .mfilter { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); background: transparent; border: 1px solid var(--line); border-radius: 6px; padding: 6px 12px; cursor: pointer; }
  .mfilter.on { color: var(--bg); background: var(--accent); border-color: var(--accent); }
  .modal-body { overflow: auto; padding: 6px 22px 22px; }
  .ttable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ttable th { position: sticky; top: 0; background: var(--panel); text-align: left; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); padding: 10px 10px; border-bottom: 1px solid var(--line); }
  .ttable td { padding: 11px 10px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  .ttable td.tname { font-weight: 500; max-width: 320px; }
  .ttable td.tname a { color: var(--text); text-decoration: none; }
  .ttable td.tname a:hover { color: var(--accent); text-decoration: underline; }
  .badge { display: inline-block; color: #0b0e14; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
  .pri { font-family: var(--mono); font-size: 11px; text-transform: capitalize; }
  .due-late { color: var(--fail); }
  @media (max-width: 640px) { .ttable th:nth-child(2), .ttable td:nth-child(2), .ttable th:nth-child(6), .ttable td:nth-child(6) { display: none; } }

  /* Header identity + role controls */
  .brand { flex-direction: row; align-items: center; gap: 14px; }
  .brand-logo { width: 46px; height: 46px; border-radius: 11px; flex: none; }
  .brand > div { display: flex; flex-direction: column; gap: 4px; }
  .usermenu { display: flex; align-items: center; gap: 10px; }
  .iconbtn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; cursor: pointer; }
  .iconbtn:hover { color: var(--text); border-color: var(--accent); }
  .chip { display: flex; flex-direction: column; align-items: flex-end; font-size: 12px; line-height: 1.25; }
  .chip-role { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); }

  /* Forms + management modals */
  .err { background: rgba(244,103,95,0.12); border: 1px solid rgba(244,103,95,0.4); color: #ffb4ae; font-size: 13px; border-radius: 9px; padding: 10px 13px; }
  .modal-form { padding: 16px 22px; overflow: auto; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 13px; font-family: var(--body); }
  .checks-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 10px 0 14px; }
  label.chk { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text); cursor: pointer; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--line-soft); }
  .btn-primary { background: var(--accent); color: var(--bg); border: 0; border-radius: 8px; padding: 10px 16px; font-weight: 600; cursor: pointer; font-size: 13px; }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 13px; }
  .btn-danger { background: transparent; border: 1px solid var(--fail); color: var(--fail); border-radius: 8px; padding: 8px 13px; cursor: pointer; font-size: 12px; }
  .urow { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 0; border-top: 1px solid var(--line-soft); }
  .urow:first-child { border-top: 0; }
  .urow .uinfo { font-size: 13px; }
  .urow .uinfo small { display: block; color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .urow select { background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 6px 8px; font-size: 12px; }

  /* Per-site detail footer: actions + social */
  .detail-foot { padding: 4px 20px 18px; }
  .site-actions { display: flex; gap: 8px; margin-bottom: 12px; }
  .social-box h4 { margin: 0 0 6px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .social-list { list-style: none; margin: 0; padding: 0; }
  .social-list li { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 12px; padding: 5px 0; border-top: 1px solid var(--line-soft); }
  .social-list li:first-child { border-top: 0; }
  .social-list a { color: var(--accent); text-decoration: none; }
  .social-add { display: flex; gap: 6px; margin-top: 8px; }
  .social-add input { flex: 1; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; color: var(--text); padding: 6px 9px; font-size: 12px; }
  .social-add input.plat { flex: 0 0 120px; }
  .linkx { color: var(--fail); cursor: pointer; background: none; border: 0; font-size: 12px; padding: 0 4px; }

  /* Unfinished-setup banner */
  .setup-banner { background: rgba(240,180,80,0.08); border: 1px solid rgba(240,180,80,0.35); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; }
  .setup-banner .banner-head { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; color: #f0c368; }
  .setup-banner ul { list-style: none; margin: 8px 0 0; padding: 0; }
  .setup-banner li { font-size: 13px; color: var(--text); padding: 4px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .setup-banner li .reason { color: var(--muted); }
  .banner-fix { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 3px 9px; font-size: 11px; cursor: pointer; }
  .banner-x { background: none; border: 0; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="brand">
      <img src="/logo.png" alt="" class="brand-logo" />
      <div>
        <span class="eyebrow">Maintenance · Operations</span>
        <h1>Digital Elements Group Site Monitoring</h1>
      </div>
    </div>
    <div class="controls">
      <div class="last-run" id="lastRun">Loading…</div>
      <button class="run" id="runBtn" onclick="runChecks()">Run checks</button>
      <div class="usermenu" id="usermenu" style="display:none">
        <button class="iconbtn" id="addSiteBtn" style="display:none" onclick="openWebsiteModal()">+ Website</button>
        <button class="iconbtn" id="usersBtn" style="display:none" onclick="openUsers()">Users</button>
        <div class="chip"><span id="me-name"></span><span class="chip-role" id="me-role"></span></div>
        <button class="iconbtn" onclick="logout()">Sign out</button>
      </div>
    </div>
  </header>

  <div id="setupBanner" class="setup-banner" style="display:none"></div>
  <div class="summary" id="summary"></div>
  <div id="board"></div>
  <footer class="note" id="foot"></footer>
</div>

<script>
const CHECKS = [
  ["https", "HTTPS"],
  ["ssl", "SSL"],
  ["cloudflare", "Cloudflare"],
  ["ctm", "CTM"],
  ["googleTag", "Google Tag"],
  ["pagespeed", "PageSpeed"],
  ["plugins", "Updates"],
  ["clickup", "Tasks"],
];

let pollTimer = null;
let latestData = null;
let WEBSITES = [];
let bannerDismissed = false;
let modalTasks = [];
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const openRows = new Set();

async function load() {
  try {
    const res = await fetch("/api/results");
    const data = await res.json();
    render(data);
    if (data.running && !pollTimer) startPolling();
    if (!data.running && pollTimer) stopPolling();
  } catch (e) {
    document.getElementById("board").innerHTML = '<div class="empty"><h3>Cannot reach the server</h3><p>Is the Node app running?</p></div>';
  }
}

async function runChecks() {
  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running';
  try {
    await fetch("/api/check", { method: "POST" });
    startPolling();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = "Run checks";
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(load, 2500);
}
function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
  const btn = document.getElementById("runBtn");
  btn.disabled = false;
  btn.textContent = "Run checks";
}

function render(data) {
  latestData = data;
  const results = data.sites || {};
  // The database is the source of truth for WHICH sites exist. Attach the latest
  // sweep results to each; sites added but not yet swept show as pending.
  let sites;
  if (WEBSITES && WEBSITES.length) {
    sites = WEBSITES.map((w) => {
      const r = results[w.id];
      return r
        ? { ...r, name: w.name, url: w.url }
        : { id: w.id, name: w.name, url: w.url, overall: "skip", checks: {}, pending: true };
    });
  } else {
    sites = Object.values(results);
  }
  const lr = document.getElementById("lastRun");
  lr.innerHTML = data.lastRun
    ? "Last sweep<br><b>" + new Date(data.lastRun).toLocaleString() + "</b>"
    : "No sweeps yet";

  renderSetupBanner();

  // Summary
  const counts = { ok: 0, warn: 0, fail: 0 };
  sites.forEach((s) => { counts[s.overall === "skip" ? "ok" : s.overall]++; });
  document.getElementById("summary").innerHTML = `
    <div class="stat"><div class="n">${sites.length}</div><div class="k">Sites</div></div>
    <div class="stat ok"><div class="n">${counts.ok}</div><div class="k">Operational</div></div>
    <div class="stat warn"><div class="n">${counts.warn}</div><div class="k">Warnings</div></div>
    <div class="stat fail"><div class="n">${counts.fail}</div><div class="k">Failing</div></div>`;

  const board = document.getElementById("board");
  if (!sites.length) {
    board.innerHTML = '<div class="empty"><h3>No sites yet</h3><p>Use <b>+ Website</b> in the header to add your first site.</p></div>';
    return;
  }

  let head = '<div class="mrow mhead"><div class="rail head"></div><div class="site">Site</div>';
  CHECKS.forEach(([, label]) => { head += `<div class="cell">${label}</div>`; });
  head += "</div>";

  const rows = sites
    .sort((a, b) => rank(b.overall) - rank(a.overall))
    .map((s) => renderRow(s))
    .join("");

  board.innerHTML = '<div class="matrix">' + head + rows + "</div>";

  const f = document.getElementById("foot");
  f.textContent = "Background checks run on a schedule; alerts fire on status changes. Click any site for detail.";
}

function rank(s) { return { fail: 3, warn: 2, ok: 1, skip: 0 }[s] || 0; }

function renderRow(s) {
  const open = openRows.has(s.id) ? " open" : "";
  let cells = "";
  CHECKS.forEach(([key, label]) => {
    const c = (s.checks && s.checks[key]) || { status: "skip", label: "—" };
    cells += `<div class="cell ${c.status}" data-k="${label}" title="${esc(c.detail || "")}" onclick="toggle('${s.id}')">
        <span class="dot ${c.status}"></span><span class="lbl">${esc(c.label || "")}</span></div>`;
  });
  return `<div class="mrow${open}" id="row-${s.id}">
      <div class="rail ${s.overall}"></div>
      <div class="site" onclick="toggle('${s.id}')">
        <span class="nm">${esc(s.name)}</span>
        <span class="ur">${esc(s.url)}</span>
      </div>
      ${cells}
      <div class="detail">${detailHtml(s)}</div>
    </div>`;
}

function detailHtml(s) {
  const cards = CHECKS.map(([key, label]) => {
    const c = (s.checks && s.checks[key]) || { status: "skip", label: "—", detail: "" };
    let extra = "";
    if (key === "plugins" && c.meta) {
      const u = c.meta.pluginUpdates || [];
      const t = c.meta.themeUpdates || [];
      if (c.meta.coreUpdate) extra += `<div class="sub">WordPress core → ${esc(c.meta.coreNewVersion || "update")}</div>`;
      if (u.length) extra += '<ul class="ulist">' + u.map((p) => `<li><span>${esc(p.name)}</span><span class="ver">${esc(p.current || "?")} → ${esc(p.new_version || "?")}</span></li>`).join("") + "</ul>";
      if (t.length) extra += '<ul class="ulist">' + t.map((p) => `<li><span>${esc(p.name)} (theme)</span><span class="ver">${esc(p.current || "?")} → ${esc(p.new_version || "?")}</span></li>`).join("") + "</ul>";
    }
    if (key === "pagespeed" && c.metrics) {
      const m = c.metrics;
      const bits = [m.lcp && "LCP " + m.lcp, m.cls && "CLS " + m.cls, m.tbt && "TBT " + m.tbt, m.fcp && "FCP " + m.fcp].filter(Boolean);
      if (bits.length) extra += '<div class="sub">' + esc(bits.join(" · ")) + "</div>";
    }
    if (key === "clickup" && c.meta) {
      const bl = c.meta.byList || [];
      if (bl.length) extra += '<ul class="ulist">' + bl.map((l) => `<li><span>${esc(l.name)}</span><span class="ver">${l.active} open · ${l.done} done</span></li>`).join("") + "</ul>";
      const totalTasks = (c.meta.active || 0) + (c.meta.done || 0);
      extra += `<button class="tasks-btn" onclick="event.stopPropagation(); openTasks('${s.id}')">View ${totalTasks ? totalTasks + " " : ""}tasks</button>`;
      if (c.meta.spaceUrl) extra += `<div class="sub"><a href="${esc(c.meta.spaceUrl)}" target="_blank" rel="noopener" style="color:var(--accent)">Open in ClickUp →</a></div>`;
    }
    return `<div class="dcard">
        <h4><span class="dot ${c.status}"></span>${label}</h4>
        <div class="val">${esc(c.label || "—")}</div>
        <div class="sub">${esc(c.detail || "")}</div>
        ${extra}
      </div>`;
  }).join("");
  return '<div class="detail-inner">' + cards + "</div>" + detailFoot(s);
}

function detailFoot(s) {
  let btns = "";
  if (ME.perms && ME.perms.manageWebsites) btns += `<button class="iconbtn" onclick="event.stopPropagation(); editWebsite('${s.id}')">Edit site</button>`;
  if (ME.perms && ME.perms.deleteWebsite) btns += `<button class="btn-danger" onclick="event.stopPropagation(); deleteWebsite('${s.id}', '${esc((s.name || '').replace(/'/g, ''))}')">Delete site</button>`;
  const actions = btns ? `<div class="site-actions">${btns}</div>` : "";
  return `<div class="detail-foot">${actions}<div class="social-box"><h4>Social links</h4><div id="social-${s.id}">…</div></div></div>`;
}

function toggle(id) {
  if (openRows.has(id)) openRows.delete(id);
  else { openRows.add(id); loadSocial(id); }
  const row = document.getElementById("row-" + id);
  if (row) row.classList.toggle("open");
}

// ---- Task modal ----
let modalSiteId = null;
let modalFilter = "all";

function fmtDue(ms) {
  if (!ms) return "—";
  return new Date(ms).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

async function openTasks(id) {
  modalSiteId = id;
  modalFilter = "all";
  modalTasks = [];
  const site = latestData && latestData.sites[id];
  document.getElementById("modal-title").textContent = site ? site.name : "Tasks";
  document.getElementById("modal-count").textContent = "";
  document.querySelectorAll(".mfilter").forEach((b) => b.classList.toggle("on", b.dataset.f === "all"));
  document.getElementById("modal-body").innerHTML = '<div class="empty" style="padding:40px">Loading tasks…</div>';
  document.getElementById("modal").classList.add("show");
  document.body.style.overflow = "hidden";
  try {
    const res = await fetch("/api/tasks/" + encodeURIComponent(id));
    const j = await res.json();
    if (!j.ok) {
      document.getElementById("modal-body").innerHTML = '<div class="empty" style="padding:40px">' + esc(j.error || "Could not load tasks.") + "</div>";
      return;
    }
    modalTasks = j.tasks || [];
    renderModal();
  } catch (e) {
    document.getElementById("modal-body").innerHTML = '<div class="empty" style="padding:40px">Could not reach the server.</div>';
  }
}
function closeTasks() {
  document.getElementById("modal").classList.remove("show");
  document.body.style.overflow = "";
  modalSiteId = null;
}
function setFilter(f) { modalFilter = f; renderModal(); }

function renderModal() {
  const site = latestData && latestData.sites[modalSiteId];
  const all = modalTasks || [];
  const tasks = modalFilter === "open" ? all.filter((t) => !t.done) : all;

  document.getElementById("modal-title").textContent = site ? site.name : "Tasks";
  const openCount = all.filter((t) => !t.done).length;
  const overdue = all.filter((t) => t.overdue).length;
  document.getElementById("modal-count").textContent =
    `${all.length} total · ${openCount} open` + (overdue ? ` · ${overdue} overdue` : "");

  document.querySelectorAll(".mfilter").forEach((b) => b.classList.toggle("on", b.dataset.f === modalFilter));

  const rows = tasks.map((t) => {
    const badge = `<span class="badge" style="background:${esc(t.statusColor || "#5b6680")}">${esc(t.status || "—")}</span>`;
    const name = t.url ? `<a href="${esc(t.url)}" target="_blank" rel="noopener">${esc(t.name)}</a>` : esc(t.name);
    const pri = t.priority ? `<span class="pri" style="color:${esc(t.priorityColor || "#8a96ad")}">${esc(t.priority)}</span>` : "—";
    const due = `<span class="${t.overdue ? "due-late" : ""}">${fmtDue(t.dueMs)}</span>`;
    const who = t.assignees && t.assignees.length ? esc(t.assignees.join(", ")) : "—";
    return `<tr><td class="tname">${name}</td><td>${esc(t.list)}</td><td>${badge}</td><td>${who}</td><td>${due}</td><td>${pri}</td></tr>`;
  }).join("");

  document.getElementById("modal-body").innerHTML = tasks.length
    ? `<table class="ttable"><thead><tr><th>Task</th><th>List</th><th>Status</th><th>Assignee</th><th>Due</th><th>Priority</th></tr></thead><tbody>${rows}</tbody></table>`
    : '<div class="empty" style="padding:40px">No tasks to show.</div>';
}

document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeTasks(); });

// ---- Auth + role-aware startup ----
let ME = { user: null, perms: {} };

async function boot() {
  try {
    const res = await fetch("/api/me");
    if (res.status === 401) { location.href = "/login"; return; }
    const j = await res.json();
    ME = { user: j.user, perms: j.perms || {} };
  } catch (e) {
    document.getElementById("board").innerHTML = '<div class="empty"><h3>Cannot reach the server</h3></div>';
    return;
  }
  const um = document.getElementById("usermenu");
  um.style.display = "flex";
  document.getElementById("me-name").textContent = ME.user.name || ME.user.email;
  document.getElementById("me-role").textContent = ROLE_LABELS[ME.user.role] || ME.user.role;
  if (ME.perms.manageWebsites) document.getElementById("addSiteBtn").style.display = "inline-block";
  if (ME.perms.manageUsers) document.getElementById("usersBtn").style.display = "inline-block";
  await refreshWebsites();
  load();
}

const ROLE_LABELS = { admin: "Administrator", webdev: "Web Developer", seo: "SEO", publisher: "Publisher", social: "Social Media" };

async function logout() {
  await fetch("/auth/logout", { method: "POST" });
  location.href = "/login";
}

// ---- Website add / edit / delete ----
let editingSiteId = null;

function openWebsiteModal(site) {
  editingSiteId = site ? site.id : null;
  document.getElementById("siteModalTitle").textContent = site ? "Edit website" : "Add website";
  const g = (id) => document.getElementById(id);
  g("f-name").value = site ? site.name : "";
  g("f-url").value = site ? site.url : "";
  g("f-lists").value = site && site.clickup && site.clickup.listIds ? site.clickup.listIds.join(", ") : "";
  g("f-cu").checked = site ? !!(site.clickup && site.clickup.enabled) : false;
  g("f-cf").checked = site ? site.expect.cloudflare !== false : true;
  g("f-ctm").checked = site ? site.expect.ctm !== false : true;
  g("f-gt").checked = site ? site.expect.googleTag !== false : true;
  g("f-hep").value = site && site.helper ? (site.helper.endpoint || "") : "";
  g("f-htok").value = site && site.helper ? (site.helper.token || "") : "";
  g("f-he").checked = site ? !!(site.helper && site.helper.enabled) : false;
  g("siteModalErr").style.display = "none";
  g("siteModal").classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeWebsiteModal() {
  document.getElementById("siteModal").classList.remove("show");
  document.body.style.overflow = "";
}
async function refreshWebsites() {
  try {
    const res = await fetch("/api/websites");
    const j = await res.json();
    if (j.ok) WEBSITES = j.websites || [];
  } catch (e) { /* keep previous cache */ }
  return WEBSITES;
}

// Re-sync from the DB and kick off a fresh sweep so changes show immediately.
function afterMutation() {
  bannerDismissed = false;
  refreshWebsites().then(() => render(latestData || { sites: {} }));
  fetch("/api/check", { method: "POST" }).then(() => startPolling()).catch(() => {});
}

function incompleteReasons(w) {
  const r = [];
  if (!w.helper || !w.helper.enabled) r.push("Updates not set up (no helper plugin)");
  else if (!w.helper.endpoint || !w.helper.token) r.push("Helper endpoint or token missing");
  if (w.clickup && w.clickup.enabled && (!w.clickup.listIds || !w.clickup.listIds.length)) r.push("ClickUp enabled but no List IDs");
  return r;
}

function renderSetupBanner() {
  const el = document.getElementById("setupBanner");
  if (!el) return;
  if (bannerDismissed) { el.style.display = "none"; return; }
  const flagged = (WEBSITES || []).map((w) => ({ w, reasons: incompleteReasons(w) })).filter((x) => x.reasons.length);
  if (!flagged.length) { el.style.display = "none"; return; }
  const canEdit = !!(ME.perms && ME.perms.manageWebsites);
  const items = flagged.map(({ w, reasons }) =>
    `<li><b>${esc(w.name)}</b><span class="reason">${esc(reasons.join(" · "))}</span>${canEdit ? `<button class="banner-fix" onclick="editWebsite('${w.id}')">Complete setup</button>` : ""}</li>`
  ).join("");
  el.innerHTML = `<div class="banner-head"><span>⚠ ${flagged.length} website${flagged.length > 1 ? "s" : ""} need setup</span><button class="banner-x" onclick="dismissBanner()">✕</button></div><ul>${items}</ul>`;
  el.style.display = "block";
}
function dismissBanner() {
  bannerDismissed = true;
  document.getElementById("setupBanner").style.display = "none";
}

async function editWebsite(id) {
  let site = WEBSITES.find((w) => w.id === id);
  if (!site) { await refreshWebsites(); site = WEBSITES.find((w) => w.id === id); }
  if (site) openWebsiteModal(site);
  else alert("Couldn't load this site's saved settings. Try reloading the page.");
}
async function saveWebsite() {
  const g = (id) => document.getElementById(id);
  const body = {
    name: g("f-name").value, url: g("f-url").value,
    clickup_list_ids: g("f-lists").value, clickup_enabled: g("f-cu").checked,
    expect_cloudflare: g("f-cf").checked, expect_ctm: g("f-ctm").checked, expect_google_tag: g("f-gt").checked,
    helper_endpoint: g("f-hep").value, helper_token: g("f-htok").value, helper_enabled: g("f-he").checked,
  };
  const btn = g("siteSaveBtn"); btn.disabled = true; btn.textContent = "Saving…";
  try {
    const url = editingSiteId ? "/api/websites/" + editingSiteId : "/api/websites";
    const res = await fetch(url, { method: editingSiteId ? "PUT" : "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const j = await res.json();
    if (!j.ok) throw new Error(j.error || "Save failed");
    closeWebsiteModal(); afterMutation();
  } catch (e) {
    const err = g("siteModalErr"); err.style.display = "block"; err.textContent = e.message;
  } finally { btn.disabled = false; btn.textContent = "Save"; }
}
async function deleteWebsite(id, name) {
  if (!confirm(`Delete "${name}"? This removes it from monitoring.`)) return;
  const res = await fetch("/api/websites/" + id, { method: "DELETE" });
  const j = await res.json();
  if (j.ok) afterMutation(); else alert(j.error || "Delete failed");
}

// ---- Users (admin) ----
function openUsers() { document.getElementById("usersModal").classList.add("show"); document.body.style.overflow = "hidden"; renderUsers(); }
function closeUsers() { document.getElementById("usersModal").classList.remove("show"); document.body.style.overflow = ""; }
async function renderUsers() {
  const box = document.getElementById("usersList");
  box.innerHTML = "Loading…";
  const res = await fetch("/api/users");
  const j = await res.json();
  if (!j.ok) { box.innerHTML = esc(j.error || "Failed to load"); return; }
  box.innerHTML = j.users.map((u) => {
    const opts = Object.keys(ROLE_LABELS).map((r) => `<option value="${r}" ${u.role === r ? "selected" : ""}>${ROLE_LABELS[r]}</option>`).join("");
    return `<div class="urow">
      <div class="uinfo">${esc(u.name || u.email)}<small>${esc(u.email)}</small></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select onchange="changeUserRole('${u.id}', this.value)">${opts}</select>
        <button class="linkx" onclick="removeUser('${u.id}','${esc(u.email)}')">Remove</button>
      </div></div>`;
  }).join("") || '<div class="empty">No users yet.</div>';
}
async function addUser() {
  const email = document.getElementById("nu-email").value.trim();
  const role = document.getElementById("nu-role").value;
  const err = document.getElementById("usersErr"); err.style.display = "none";
  const res = await fetch("/api/users", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, role }) });
  const j = await res.json();
  if (!j.ok) { err.style.display = "block"; err.textContent = j.error || "Failed"; return; }
  document.getElementById("nu-email").value = ""; renderUsers();
}
async function changeUserRole(id, role) {
  const res = await fetch("/api/users/" + id, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ role }) });
  const j = await res.json();
  if (!j.ok) { alert(j.error || "Failed"); renderUsers(); }
}
async function removeUser(id, email) {
  if (!confirm(`Remove ${email}? They'll lose access immediately.`)) return;
  const res = await fetch("/api/users/" + id, { method: "DELETE" });
  const j = await res.json();
  if (j.ok) renderUsers(); else alert(j.error || "Failed");
}

// ---- Social links ----
async function loadSocial(siteId) {
  const box = document.getElementById("social-" + siteId);
  if (!box) return;
  try {
    const res = await fetch("/api/websites/" + siteId + "/social");
    const j = await res.json();
    const links = (j.ok && j.links) || [];
    const canEdit = !!ME.perms.editSocial;
    const list = links.length
      ? '<ul class="social-list">' + links.map((l) =>
          `<li><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.platform)}</a>${canEdit ? `<button class="linkx" onclick="removeSocial('${l.id}','${siteId}')">remove</button>` : ""}</li>`).join("") + "</ul>"
      : '<div class="sub" style="color:var(--faint);font-size:12px">No social links yet.</div>';
    const adder = canEdit
      ? `<div class="social-add"><input class="plat" id="sp-${siteId}" placeholder="Platform" /><input id="su-${siteId}" placeholder="https://…" /><button class="btn-primary" onclick="addSocial('${siteId}')">Add</button></div>`
      : "";
    box.innerHTML = list + adder;
  } catch (e) { box.innerHTML = '<div class="sub">Could not load links.</div>'; }
}
async function addSocial(siteId) {
  const platform = document.getElementById("sp-" + siteId).value.trim();
  const url = document.getElementById("su-" + siteId).value.trim();
  if (!platform || !url) return;
  const res = await fetch("/api/websites/" + siteId + "/social", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ platform, url }) });
  const j = await res.json();
  if (j.ok) loadSocial(siteId); else alert(j.error || "Failed");
}
async function removeSocial(id, siteId) {
  const res = await fetch("/api/social/" + id, { method: "DELETE" });
  const j = await res.json();
  if (j.ok) loadSocial(siteId); else alert(j.error || "Failed");
}

boot();
</script>
  <div class="modal" id="modal" onclick="if(event.target===this)closeTasks()">
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <div class="modal-eyebrow">ClickUp tasks</div>
          <h2 id="modal-title">Tasks</h2>
          <div class="modal-count" id="modal-count"></div>
        </div>
        <button class="modal-x" onclick="closeTasks()" aria-label="Close">×</button>
      </div>
      <div class="modal-filters">
        <button class="mfilter on" data-f="all" onclick="setFilter('all')">All</button>
        <button class="mfilter" data-f="open" onclick="setFilter('open')">Open only</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
  <div class="modal" id="siteModal" onclick="if(event.target===this)closeWebsiteModal()">
    <div class="modal-panel">
      <div class="modal-head">
        <div><div class="modal-eyebrow">Website</div><h2 id="siteModalTitle">Add website</h2></div>
        <button class="modal-x" onclick="closeWebsiteModal()" aria-label="Close">×</button>
      </div>
      <div class="modal-form">
        <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Client name" /></div>
        <div class="field"><label>URL</label><input type="url" id="f-url" placeholder="https://example.com" /></div>
        <div class="field"><label>ClickUp List IDs (comma-separated)</label><input type="text" id="f-lists" placeholder="901bbb, 901ccc" /></div>
        <div class="checks-row">
          <label class="chk"><input type="checkbox" id="f-cu" /> ClickUp enabled</label>
          <label class="chk"><input type="checkbox" id="f-cf" checked /> Expect Cloudflare</label>
          <label class="chk"><input type="checkbox" id="f-ctm" checked /> Expect CTM</label>
          <label class="chk"><input type="checkbox" id="f-gt" checked /> Expect Google Tag</label>
        </div>
        <div class="field"><label>Helper endpoint (optional)</label><input type="text" id="f-hep" placeholder="https://site.com/wp-json/wpmonitor/v1/status" /></div>
        <div class="field"><label>Helper token (optional)</label><input type="text" id="f-htok" /></div>
        <label class="chk"><input type="checkbox" id="f-he" /> Helper plugin installed (enable Updates)</label>
        <div id="siteModalErr" class="err" style="display:none;margin-top:12px"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeWebsiteModal()">Cancel</button>
        <button class="btn-primary" id="siteSaveBtn" onclick="saveWebsite()">Save</button>
      </div>
    </div>
  </div>

  <div class="modal" id="usersModal" onclick="if(event.target===this)closeUsers()">
    <div class="modal-panel">
      <div class="modal-head">
        <div><div class="modal-eyebrow">Team</div><h2>Users &amp; roles</h2></div>
        <button class="modal-x" onclick="closeUsers()" aria-label="Close">×</button>
      </div>
      <div class="modal-form">
        <div class="social-add">
          <input type="email" id="nu-email" placeholder="name@company.com" />
          <select id="nu-role">
            <option value="webdev">Web Developer</option>
            <option value="admin">Administrator</option>
            <option value="seo">SEO</option>
            <option value="publisher">Publisher</option>
            <option value="social">Social Media</option>
          </select>
          <button class="btn-primary" onclick="addUser()">Add</button>
        </div>
        <div id="usersErr" class="err" style="display:none;margin-top:10px"></div>
        <div id="usersList" style="margin-top:14px"></div>
      </div>
    </div>
  </div>
</body>
</html>
